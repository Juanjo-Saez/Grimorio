services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: grimorio-laravel
        container_name: grimorio-laravel
        restart: unless-stopped
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - grimorio
        depends_on:
            mysql:
                condition: service_healthy

    mysql:
        image: 'mysql:8.0'
        container_name: grimorio-mysql
        restart: unless-stopped
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_DATABASE: '${DB_DATABASE:-grimorio}'
            MYSQL_USER: '${DB_USERNAME:-wizard}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 0
        volumes:
            - 'mysql-data:/var/lib/mysql'

        command: --default-authentication-plugin=mysql_native_password

        networks:
            - grimorio
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-wizard}", "-p${DB_PASSWORD:-password}"]
            interval: 10s
            timeout: 5s
            retries: 5

networks:
    grimorio:
        driver: bridge

volumes:
    mysql-data:
        driver: local